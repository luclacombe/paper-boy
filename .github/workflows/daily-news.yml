name: Daily Newspaper

on:
  schedule:
    # Runs at 6:00 AM UTC every day — adjust to your timezone
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Build and deliver newspaper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          # Use config.yaml if committed, otherwise fall back to example
          if [ -f config.yaml ]; then
            paper-boy deliver --config config.yaml
          else
            paper-boy deliver --config config.example.yaml
          fi

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newspaper-${{ github.run_number }}
          path: "*.epub"
          retention-days: 90
